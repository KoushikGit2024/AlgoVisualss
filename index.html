<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AlgoVisuals</title>
    <script>
      (function() {
        try {
          var f = localStorage.getItem('appFontSize') || 'md';
          var s = '16px';
          if (f === 'sm') s = '12px';
          if (f === 'lg') s = '20px';
          document.documentElement.style.fontSize = s;
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
